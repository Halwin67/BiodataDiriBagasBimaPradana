<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Bagas Bima Pradana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <!-- Area Profil -->
        <aside class="photo-area">
            <div class="photo-container">
                <img src="bagas.png" alt="Foto Bagas Bima Pradana">
                <p class="name">Bagas Bima Pradana</p>
                <a href="https://www.instagram.com/babas_ajhh" class="ig-link">@babas_ajhh</a>
            </div>
        </aside>

        <!-- Area Hobi -->
        <section class="hobbies">
            <h1>Hobby Saya</h1>
            
            <div class="hobby-card">
                <img src="gundam.png" alt="Rakitan Gunpla" class="hobby-img">
                <div class="hobby-info">
                    <h3>Merakit Gunpla</h3>
                    <p>Ini adalah salah satu hasil rakitan <em>mobile suit model kits</em> (Gunpla) saya.</p>
                </div>
            </div>

            <div class="hobby-card">
                <img src="gambar.png" alt="Hasil Gambaran" class="hobby-img">
                <div class="hobby-info">
                    <h3>Menggambar</h3>
                    <p>Ini adalah hasil karya gambar saya, terinspirasi dari manga seperti <em>JoJo's Bizarre Adventure</em>.</p>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
